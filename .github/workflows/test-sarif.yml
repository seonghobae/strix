name: Test SARIF export & upload

on:
  push:
    branches:
      - 'copilot/add-sarif-upload-support'
  workflow_dispatch:

permissions:
  security-events: write   # required for code-scanning SARIF upload
  contents: read

jobs:
  unit-tests:
    name: Unit tests (sarif module)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run SARIF unit tests
        run: poetry run pytest tests/test_sarif.py -v --no-cov

  integration-upload:
    name: Integration – upload real SARIF to code scanning
    runs-on: ubuntu-latest
    # Only run on the PR branch where the secrets are relevant
    if: github.ref == 'refs/heads/copilot/add-sarif-upload-support'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Generate SARIF and upload to GitHub code scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF:   ${{ github.ref }}
          GITHUB_SHA:   ${{ github.sha }}
        run: |
          poetry run python - <<'EOF'
          import json, os, sys
          sys.path.insert(0, ".")
          from strix.sarif import to_sarif, upload_sarif_to_github

          # Build a minimal synthetic vulnerability report to keep the test
          # self-contained (no live scan target required).
          reports = [
              {
                  "id": "test-sarif-ci-001",
                  "title": "CI integration test finding",
                  "severity": "low",
                  "description": "Synthetic finding created by the SARIF CI integration test.",
                  "remediation_steps": "No action needed – this is a synthetic CI test result.",
                  "cvss": 1.0,
                  "cwe": "CWE-0",
                  "target": "https://example.com",
                  "timestamp": "2024-01-01 00:00:00 UTC",
                  "code_locations": [
                      {
                          "file": "strix/sarif.py",
                          "start_line": 1,
                          "end_line": 1,
                          "snippet": "# SARIF CI integration test",
                      }
                  ],
              }
          ]

          sarif = to_sarif(reports, tool_version="ci-test")

          token = os.environ["GITHUB_TOKEN"]
          repo  = os.environ.get("GITHUB_REPOSITORY", "${{ github.repository }}")
          ref   = os.environ["GITHUB_REF"]
          sha   = os.environ["GITHUB_SHA"]

          print(f"Uploading SARIF to {repo} ref={ref} sha={sha[:8]}...")
          result = upload_sarif_to_github(
              sarif=sarif,
              github_token=token,
              github_repo=repo,
              ref=ref,
              commit_sha=sha,
          )

          print(json.dumps(result, indent=2))
          if not result["success"]:
              sys.exit(1)
          print("SARIF upload succeeded.")
          EOF
